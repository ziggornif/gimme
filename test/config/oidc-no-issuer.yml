# OIDC mode without issuer (admin credentials not required in oidc mode)
port: 8080
secret: secret-for-testing-purposes-only
s3:
  url: test.s3.url.cloud
  key: s3key
  secret: s3secret
  bucketName: gimme
  location: eu-west-1
  ssl: true
auth:
  mode: oidc
  oidc:
    client_id: gimme
    redirect_url: https://gimme.example.com/auth/callback
