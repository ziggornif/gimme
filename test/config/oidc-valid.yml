# Valid OIDC config — no admin credentials required
port: 8080
secret: secret
s3:
  url: test.s3.url.cloud
  key: s3key
  secret: s3secret
  bucketName: gimme
  location: eu-west-1
  ssl: true
auth:
  mode: oidc
  oidc:
    issuer: https://keycloak.example.com/realms/gimme
    client_id: gimme
    redirect_url: https://gimme.example.com/auth/callback
