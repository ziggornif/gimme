apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gimme.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gimme.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ required "credentials.secret is required" .Values.credentials.secret | quote }}
  admin-user: {{ required "credentials.admin.user is required" .Values.credentials.admin.user | quote }}
  admin-password: {{ required "credentials.admin.password is required" .Values.credentials.admin.password | quote }}
  s3-key: {{ required "credentials.s3.key is required" .Values.credentials.s3.key | quote }}
  s3-secret: {{ required "credentials.s3.secret is required" .Values.credentials.s3.secret | quote }}
  {{- if eq .Values.auth.mode "oidc" }}
  {{- /* oidcClientSecret is optional: omit for public clients (PKCE); set for confidential clients. */}}
  oidc-client-secret: {{ .Values.credentials.oidcClientSecret | default "" | quote }}
  {{- end }}
  {{- if eq .Values.tokenStore.mode "postgres" }}
  pg-url: {{ required "tokenStore.pgUrl is required when tokenStore.mode is postgres" .Values.tokenStore.pgUrl | quote }}
  {{- end }}
