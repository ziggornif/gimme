suite: secret tests
templates:
  - templates/secret.yaml
set:
  s3.url: "http://fake:3900"
  credentials.secret: "my-jwt-secret"
  credentials.admin.user: "admin"
  credentials.admin.password: "admin-pass"
  credentials.s3.key: "my-s3-key"
  credentials.s3.secret: "my-s3-secret"
tests:
  - it: should render a Secret
    asserts:
      - isKind:
          of: Secret

  - it: should be of type Opaque
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain base credentials
    asserts:
      - equal:
          path: stringData.secret
          value: "my-jwt-secret"
      - equal:
          path: stringData.admin-user
          value: "admin"
      - equal:
          path: stringData.admin-password
          value: "admin-pass"
      - equal:
          path: stringData.s3-key
          value: "my-s3-key"
      - equal:
          path: stringData.s3-secret
          value: "my-s3-secret"

  - it: should not contain oidc-client-secret when auth.mode is basic
    asserts:
      - notExists:
          path: stringData.oidc-client-secret

  - it: should contain oidc-client-secret when auth.mode is oidc
    set:
      auth.mode: oidc
      auth.oidc.issuer: "https://idp.example.com"
      auth.oidc.clientId: "gimme"
      auth.oidc.redirectUrl: "https://gimme.example.com/callback"
      credentials.oidcClientSecret: "my-oidc-secret"
    asserts:
      - equal:
          path: stringData.oidc-client-secret
          value: "my-oidc-secret"
