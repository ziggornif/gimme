suite: serviceaccount tests
templates:
  - templates/serviceaccount.yaml
set:
  s3.url: "http://fake:3900"
  credentials.secret: "x"
  credentials.admin.user: "x"
  credentials.admin.password: "x"
  credentials.s3.key: "x"
  credentials.s3.secret: "x"
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should not create a ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom name when set
    set:
      serviceAccount.name: "my-sa"
    asserts:
      - equal:
          path: metadata.name
          value: "my-sa"

  - it: should include annotations when provided
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::role/gimme"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::role/gimme"
