on:
  release:
    types: [created]

jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build and publish in parallel: linux/386, linux/amd64, linux/arm64, windows/386, windows/amd64, darwin/amd64, darwin/arm64
        goos: [linux, windows, darwin]
        goarch: ["386", amd64, arm64]
        exclude:
          - goarch: "386"
            goos: darwin
          - goarch: arm64
            goos: windows
    steps:
    - uses: actions/checkout@v4
    - name: Prepare example config
      run: cp gimme.example.yml gimme.yml
    - uses: wangyoucao577/go-release-action@v1.55
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        goversion: latest
        extra_files: LICENSE README.md gimme.yml templates docs
  release-docker:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ secrets.DOCKER_REPO }}
    steps:
      - uses: actions/checkout@v4
      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin
      - name: Build the Docker image
        env:
          REF_NAME: ${{ github.ref_name }}
        run: docker build -t $REPO:$REF_NAME .
      - name: Publish Docker image
        env:
          REF_NAME: ${{ github.ref_name }}
        run: docker push $REPO:$REF_NAME
  release-helm:
    needs: release-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.1"
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Update chart version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$REF_NAME"
          # Strip leading 'v' if present (e.g. v1.2.3 -> 1.2.3)
          CHART_VERSION="${VERSION#v}"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" examples/deployment/helm/gimme/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" examples/deployment/helm/gimme/Chart.yaml
      - name: Package Helm chart
        run: helm package examples/deployment/helm/gimme/
      - name: Push Helm chart to GHCR
        run: helm push "gimme-${CHART_VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/charts
